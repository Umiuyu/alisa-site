<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Алиса лучшая</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
            max-width: 600px;
            width: 100%;
        }

        .card:hover {
            transform: scale(1.02);
        }

        h1 {
            font-size: 4rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
            }
            to {
                text-shadow: 0 0 20px rgba(118, 75, 162, 0.8);
            }
        }

        .message {
            font-size: 1.5rem;
            color: #333;
            line-height: 1.6;
            margin: 30px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 20px;
            border-left: 5px solid #764ba2;
            text-align: left;
        }

        .stars {
            font-size: 2rem;
            letter-spacing: 10px;
            color: #ffd700;
            margin: 20px 0;
        }

        .button {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            margin-top: 20px;
        }

        .button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .footer {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #999;
        }

        @media (max-width: 600px) {
            .card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 2.5rem;
            }
            .message {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="stars">★★★★★</div>
        <h1>Алиса лучшая</h1>
        <div class="message">
            ✨ Алиса — самая замечательная!<br>
            🌟 Лучшая во всём!<br>
            💖 Ты невероятная, Алиса!
        </div>
        <button class="button" onclick="alert('Алиса действительно лучшая! ✨')">Нажми, чтобы подтвердить</button>
        <div class="footer">Сделано с любовью для Алисы</div>
    </div>
</body>
</html>
